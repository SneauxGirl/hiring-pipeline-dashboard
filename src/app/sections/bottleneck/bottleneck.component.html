<p-card [styleClass]="cardStyleClass" [pt]="cardPt">
  <div class="@container/bottleneck bottleneck-layout flex min-h-0 flex-col gap-4 @min-[43.25rem]/dashboard:flex-1">
    <h2 class="m-0 text-[length:var(--font-size-label)] text-color">Bottlenecks</h2>

    <ul class="bottleneck-list m-0 flex list-none flex-col gap-3 p-0 @min-[43.25rem]/dashboard:flex-1 @min-[43.25rem]/dashboard:justify-between">
      @for (bottleneck of bottlenecks; track bottleneck.id) {
        <li
          class="relative flex min-w-0 items-center gap-3 overflow-hidden rounded-border border border-surface bg-white p-3 @max-[420px]/bottleneck:p-0 @max-[420px]/bottleneck:pe-3 @min-[43.25rem]/dashboard:min-w-0 @min-[43.25rem]/dashboard:flex-1 @min-[43.25rem]/dashboard:basis-auto"
          [style.border-inline-start-width]="'3px'"
          [style.border-inline-start-color]="borderColor(bottleneck.responsibility)"
        >
          <div
            class="flex shrink-0 items-center justify-center self-stretch @min-[421px]/bottleneck:-my-3 @min-[421px]/bottleneck:-ms-3 @min-[421px]/bottleneck:px-2.5 @max-[420px]/bottleneck:w-15 @max-[420px]/bottleneck:px-2.5 @max-[420px]/bottleneck:py-4"
            [style.background]="asidePaleBg(bottleneck.responsibility)"
          >
            <span
              class="flex size-9 shrink-0 items-center justify-center rounded-border text-base"
              [style.background]="iconBg(bottleneck.responsibility)"
              [style.color]="accentColor(bottleneck.responsibility)"
              aria-hidden="true"
            >
              <span [class]="responsibilityConfig(bottleneck.responsibility).iconClass"></span>
            </span>
          </div>

          <div
            class="flex min-w-0 flex-1 flex-row items-center gap-3 @max-[420px]/bottleneck:flex-col @max-[420px]/bottleneck:items-start @max-[420px]/bottleneck:self-center @max-[420px]/bottleneck:justify-center @max-[420px]/bottleneck:py-4 @max-[420px]/bottleneck:gap-2.5"
          >
            <div
              class="min-w-0 flex-1 break-words text-base font-bold text-color @max-[420px]/bottleneck:flex-none"
            >
              {{ bottleneck.title }}
            </div>

            <div
              class="bottleneck-metrics flex shrink-0 flex-row items-start gap-2 @max-[420px]/bottleneck:ms-auto @max-[420px]/bottleneck:min-w-[10rem] @max-[420px]/bottleneck:justify-between @min-[421px]/bottleneck:ms-auto @min-[421px]/bottleneck:max-w-[250px] @min-[421px]/bottleneck:min-w-0 @min-[421px]/bottleneck:flex-1 @min-[421px]/bottleneck:justify-between"
            >
              <div
                class="bottleneck-metrics-candidates flex shrink-0 flex-col items-start text-left gap-[0.2rem] leading-none"
              >
                <span
                  class="text-base font-bold leading-none"
                  [style.color]="accentColor(bottleneck.responsibility)"
                >
                  {{ bottleneck.candidateCount }}
                </span>
                <span
                  class="text-[length:var(--font-size-label)] leading-none text-muted-color"
                >
                  {{ candidateLabel(bottleneck.candidateCount) }}
                </span>
              </div>
              <div
                class="bottleneck-metrics-delay flex shrink-0 flex-col items-start text-left gap-[0.2rem] leading-none"
              >
                <span
                  class="text-base font-bold leading-none"
                  [style.color]="accentColor(bottleneck.responsibility)"
                >
                  {{ bottleneck.avgMetric }} days
                </span>
                <span
                  class="text-[length:var(--font-size-label)] leading-none text-muted-color"
                >
                  {{ bottleneck.avgLabel }}
                </span>
              </div>
            </div>
          </div>
        </li>
      }
    </ul>
  </div>
</p-card>
