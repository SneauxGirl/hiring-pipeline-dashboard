<header class="mobile-header" aria-label="Mobile navigation">
  <div class="mobile-header-bar">
    <button
      type="button"
      class="mobile-header-menu"
      aria-label="Open navigation menu"
      (click)="openDrawer()"
    >
      <span class="pi pi-bars" aria-hidden="true"></span>
    </button>

    <div class="mobile-header-brand">
      <img class="dashboard-brand-logo" src="/PIPTechLogo.png" alt="PIP Tech" />
    </div>

    <div class="mobile-header-schedule">
      <span class="pi pi-calendar" aria-hidden="true"></span>
      <p-select
        [options]="weeks"
        [ngModel]="selectedWeek"
        (ngModelChange)="onWeekChange($event)"
        optionLabel="label"
        optionValue="key"
        ariaLabel="Select week"
        class="week-range-select mobile-header-week-select w-full min-w-[10rem] max-w-[11rem]"
        panelStyleClass="week-range-select-panel"
      />
    </div>
  </div>
</header>

<p-drawer
  [(visible)]="drawerVisible"
  position="left"
  [modal]="true"
  [closable]="true"
  ariaCloseLabel="Close navigation menu"
  styleClass="dashboard-drawer"
>
  <div class="flex flex-col gap-4">
    <p-menu
      [model]="menuItems"
      [popup]="false"
      ariaLabel="Mobile navigation menu"
      styleClass="dashboard-nav-menu w-full"
    />

    <div
      class="flex items-center gap-3 border-t border-surface pt-4"
      aria-label="Signed in user"
    >
      <p-avatar
        [image]="user.avatarUrl"
        shape="circle"
        [attr.aria-label]="user.name"
      />
      <div class="min-w-0">
        <div class="truncate text-base font-medium text-color">{{ user.name }}</div>
        <div class="truncate text-[length:var(--font-size-label)] text-muted-color">{{ user.title }}</div>
      </div>
    </div>
  </div>
</p-drawer>
