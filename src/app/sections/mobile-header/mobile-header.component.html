<header
  class="border-b border-surface bg-surface-0 px-[length:var(--dashboard-margin)] py-2 max-[459px]:px-2"
  aria-label="Mobile navigation"
>
  <div
    class="flex min-h-[length:var(--dashboard-control-height)] items-center justify-between gap-3 max-[459px]:gap-2"
  >
    <button
      type="button"
      [class]="iconBtnClass + ' text-[color:var(--pip-nav-active-ink)]'"
      aria-label="Open navigation menu"
      (click)="openDrawer()"
    >
      <span class="pi pi-bars text-xl leading-none" aria-hidden="true"></span>
    </button>

    <div
      class="flex h-[length:var(--dashboard-control-height)] min-w-0 flex-1 items-center justify-center"
    >
      <img
        class="dashboard-brand-logo h-[length:var(--mobile-header-logo-height)] shrink-0"
        src="/PurplePipLogo.png"
        alt="PIP Tech"
      />
    </div>

    <div
      class="flex h-[length:var(--dashboard-control-height)] min-w-0 shrink-0 items-center"
    >
      <button
        type="button"
        [class]="iconBtnClass + ' hidden text-[color:var(--pip-nav-active-ink)] max-[459px]:inline-flex'"
        aria-label="Schedule"
      >
        <span class="pi pi-calendar text-xl leading-none" aria-hidden="true"></span>
      </button>

      <div
        class="flex h-[length:var(--dashboard-control-height)] min-w-0 shrink-0 items-center gap-2 text-muted-color max-[459px]:hidden"
      >
        <span class="pi pi-calendar" aria-hidden="true"></span>
        <p-select
          [options]="storyDates"
          [ngModel]="selectedDateKey"
          (ngModelChange)="onDateChange($event)"
          optionLabel="label"
          optionValue="value"
          ariaLabel="Select date"
          class="week-range-select h-[length:var(--dashboard-control-height)] w-full min-w-[10rem] max-w-[11rem]"
          panelStyleClass="week-range-select-panel"
        />
      </div>
    </div>
  </div>
</header>

<p-drawer
  [(visible)]="drawerVisible"
  position="left"
  [modal]="true"
  [closable]="false"
  styleClass="dashboard-drawer"
>
  <ng-template #header>
    <div class="flex w-full min-w-0 items-center justify-between gap-3">
      <img
        src="/PurplePipLogo.png"
        alt="PIP Tech"
        class="dashboard-brand-logo h-[length:var(--dashboard-brand-logo-height)] shrink-0 -translate-y-0.5"
      />
      <button
        type="button"
        [class]="iconBtnClass + ' text-muted-color hover:text-color'"
        aria-label="Close navigation menu"
        (click)="closeDrawer()"
      >
        <span class="pi pi-times text-xl leading-none" aria-hidden="true"></span>
      </button>
    </div>
  </ng-template>

  <div class="flex flex-col gap-4">
    <p-menu
      [model]="menuItems"
      [popup]="false"
      ariaLabel="Mobile navigation menu"
      styleClass="dashboard-nav-menu w-full"
    />

    <div
      class="flex items-center gap-3 border-t border-surface pt-4"
      aria-label="Signed in user"
    >
      <p-avatar
        [image]="user.avatarUrl"
        shape="circle"
        [attr.aria-label]="user.name"
      />
      <div class="min-w-0">
        <div class="truncate text-base font-medium text-color">{{ user.name }}</div>
        <div class="truncate text-[length:var(--font-size-label)] text-muted-color">
          {{ user.title }}
        </div>
      </div>
    </div>
  </div>
</p-drawer>
