<header
  class="border-b border-surface bg-surface-0 px-[length:var(--dashboard-margin)] py-2 max-[459px]:px-2"
  aria-label="Mobile navigation"
>
  <div
    class="flex min-h-[length:var(--dashboard-control-height)] items-center justify-between gap-3 max-[459px]:gap-2"
  >
    <button
      type="button"
      [class]="iconBtnClass + ' text-[color:var(--pip-nav-active-ink)]'"
      aria-label="Open navigation menu"
      (click)="openDrawer()"
    >
      <span class="pi pi-bars text-xl leading-none" aria-hidden="true"></span>
    </button>

    <div
      class="flex h-[length:var(--dashboard-control-height)] min-w-0 flex-1 items-center justify-center"
    >
      <img
        class="dashboard-brand-logo h-[length:var(--mobile-header-logo-height)] shrink-0"
        src="/PurplePipLogo.png"
        alt="PIP Tech"
      />
    </div>

    <button
      type="button"
      [class]="iconBtnClass + ' text-[color:var(--pip-nav-active-ink)]'"
      aria-label="Open calendar and schedule"
      [attr.aria-expanded]="calendarDrawerVisible"
      (click)="openCalendarDrawer()"
    >
      <span class="pi pi-calendar text-xl leading-none" aria-hidden="true"></span>
    </button>
  </div>
</header>

<p-drawer
  [(visible)]="drawerVisible"
  position="left"
  [modal]="true"
  [closable]="false"
  [styleClass]="drawerStyleClass"
  [pt]="drawerPt"
>
  <ng-template #header>
    <div class="flex w-full min-w-0 items-center justify-between gap-3">
      <img
        src="/PurplePipLogo.png"
        alt="PIP Tech"
        class="block h-[length:var(--dashboard-brand-logo-height)] w-auto max-w-full shrink-0 -translate-y-0.5 object-contain"
      />
      <button
        type="button"
        [class]="iconBtnClass + ' text-muted-color hover:text-color'"
        aria-label="Close navigation menu"
        (click)="closeDrawer()"
      >
        <span class="pi pi-times text-xl leading-none" aria-hidden="true"></span>
      </button>
    </div>
  </ng-template>

  <div class="flex flex-col gap-4">
    <p-menu
      [model]="menuItems"
      [popup]="false"
      ariaLabel="Mobile navigation menu"
      [styleClass]="navMenuStyleClass"
      [pt]="navMenuPt"
    />

    <div
      class="flex items-center gap-3 border-t border-surface pt-4"
      aria-label="Signed in user"
    >
      <p-avatar
        [image]="user.avatarUrl"
        shape="circle"
        [attr.aria-label]="user.name"
      />
      <div class="min-w-0">
        <div class="truncate text-base font-medium text-color">{{ user.name }}</div>
        <div class="truncate text-[length:var(--font-size-label)] text-muted-color">
          {{ user.title }}
        </div>
      </div>
    </div>
  </div>
</p-drawer>

<p-drawer
  [(visible)]="calendarDrawerVisible"
  position="right"
  [modal]="true"
  [closable]="false"
  [styleClass]="calendarDrawerStyleClass"
  [pt]="drawerPt"
>
  <ng-template #header>
    <div class="flex w-full min-w-0 items-center justify-between gap-3">
      <img
        src="/PurplePipLogo.png"
        alt="PIP Tech"
        class="block h-[length:var(--dashboard-brand-logo-height)] w-auto max-w-full shrink-0 -translate-y-0.5 object-contain"
      />
      <button
        type="button"
        [class]="iconBtnClass + ' text-muted-color hover:text-color'"
        aria-label="Close calendar and schedule"
        (click)="closeCalendarDrawer()"
      >
        <span class="pi pi-times text-xl leading-none" aria-hidden="true"></span>
      </button>
    </div>
  </ng-template>

  <div class="flex flex-col gap-6">
    <app-dashboard-date-picker
      [inline]="true"
      [closeOnSelect]="false"
      [viewerDay]="viewerDay"
      [calendarMinDate]="calendarMinDate"
      [calendarMaxDate]="calendarMaxDate"
      [selectedDate]="selectedDate"
      (selectedDateChange)="onSelectedDateChange($event)"
    />

    <app-schedule
      [schedule]="schedule"
      [candidates]="candidates"
      [selectedDate]="selectedDate"
      [viewerDate]="viewerDay.date"
      [embedded]="true"
    />
  </div>
</p-drawer>
