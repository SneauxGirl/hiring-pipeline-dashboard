<header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
  <div
    class="flex min-h-[length:var(--dashboard-header-row-height)] min-w-0 flex-col justify-end"
  >
    <h1 class="sr-only">Hiring dashboard</h1>
    <p class="m-0 text-[length:var(--font-size-heading-sm)] font-normal leading-snug text-color">
      {{ timeGreeting }}{{ firstName }}.
    </p>
    <p class="text-accent m-0 mt-1.5 text-muted-color">
      Here's what's happening with your hiring.
    </p>
  </div>

  <div class="flex shrink-0 items-center gap-2 self-start sm:self-center">
    <span class="pi pi-calendar text-muted-color" aria-hidden="true"></span>
    <p-select
      [options]="storyDates"
      [ngModel]="selectedDateKey"
      (ngModelChange)="onDateChange($event)"
      optionLabel="label"
      optionValue="value"
      ariaLabel="Select date"
      class="week-range-select w-full min-w-[12rem] sm:min-w-[14rem]"
      panelStyleClass="week-range-select-panel"
    />
  </div>
</header>
