<nav
  class="flex h-full w-full flex-col border-r border-[color-mix(in_oklch,var(--gray-400)_35%,white)] bg-white px-3 py-5"
  aria-label="Main navigation"
>
  <div
    class="px-2 font-[family-name:var(--font-heading)] text-[length:var(--font-size-heading-md)] font-bold uppercase tracking-[0.1em] text-[var(--bright-blue)]"
  >
    Pipeline
  </div>

  <p-menu [model]="menuModel" [popup]="false" styleClass="dashboard-nav-menu mt-6 w-full flex-1" />

  <div
    class="mt-auto flex items-center gap-3 border-t border-[color-mix(in_oklch,var(--gray-400)_35%,white)] px-2 pt-4"
    aria-label="Signed in user"
  >
    <p-avatar [label]="userInitials" shape="circle" aria-hidden="true" />
    <div class="min-w-0">
      <div class="truncate text-base font-medium text-[var(--gray-900)]">{{ user.name }}</div>
      <div class="truncate text-sm text-[var(--gray-700)]">{{ user.title }}</div>
    </div>
  </div>
</nav>
