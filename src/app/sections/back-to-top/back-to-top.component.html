@if (visible()) {
  <div
    class="pointer-events-none fixed inset-x-0 bottom-5 z-50 flex justify-center md:pl-[length:var(--sidebar-width)]"
  >
    <div
      class="pointer-events-none flex w-full max-w-[length:var(--dashboard-max-width)] justify-end px-[length:var(--dashboard-margin)]"
    >
      <button
        type="button"
        [class]="buttonClass + ' pointer-events-auto'"
        aria-label="Back to top"
        (click)="scrollToTop()"
      >
        <span class="pi pi-chevron-up text-xl leading-none" aria-hidden="true"></span>
      </button>
    </div>
  </div>
}
