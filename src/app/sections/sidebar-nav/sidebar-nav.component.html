<nav
  id="sidebar-main-nav"
  class="sidebar-nav flex h-full w-full min-w-0 flex-col border-r border-surface bg-surface-0 px-3 pb-[length:var(--sidebar-edge-gap)] pt-[length:var(--dashboard-header-padding-block)] lg:pt-[length:var(--dashboard-header-padding-block-lg)]"
  aria-label="Main navigation"
>
  <div
    class="flex min-h-[length:var(--dashboard-header-row-height)] items-center gap-2"
    [class.justify-between]="!collapsed"
    [class.justify-center]="collapsed"
  >
    @if (!collapsed) {
      <div class="sidebar-brand flex min-w-0 items-center">
        <img
          src="/PurplePipLogo.png"
          alt="PIP Tech"
          class="block h-[length:var(--dashboard-brand-logo-height)] w-auto max-w-full shrink-0 -translate-y-0.5 object-contain"
        />
      </div>
    }

    <button
      type="button"
      class="inline-flex size-[length:var(--sidebar-toggle-size)] shrink-0 cursor-pointer items-center justify-center rounded-border border-0 bg-transparent p-0 text-muted-color hover:bg-[color:var(--pip-nav-hover-bg)] hover:text-[color:var(--pip-nav-hover-ink)] active:bg-[color:var(--pip-nav-active-bg)] active:text-[color:var(--pip-nav-active-ink)] focus:outline-none focus-visible:bg-[color:var(--pip-nav-active-bg)] focus-visible:text-[color:var(--pip-nav-active-ink)] focus-visible:shadow-[inset_0_0_0_2px_var(--pip-nav-active-ink)]"
      [attr.aria-expanded]="!collapsed"
      aria-controls="sidebar-main-nav"
      [attr.aria-label]="toggleLabel"
      (click)="toggle.emit()"
    >
      <span
        class="pi text-base"
        [class.pi-chevron-left]="!collapsed"
        [class.pi-chevron-right]="collapsed"
        aria-hidden="true"
      ></span>
    </button>
  </div>

  <p-menu
    [model]="menuModel"
    [popup]="false"
    ariaLabel="Dashboard sections"
    [styleClass]="navMenuStyleClass"
    [pt]="navMenuPt"
  />

  <div
    class="mt-auto mb-4 w-full border-t border-surface pt-4"
    aria-label="Signed in user"
  >
    <div
      class="flex items-center gap-3"
      [class.justify-center]="collapsed"
      [class.pl-4]="!collapsed"
    >
      <img
        [src]="user.avatarUrl"
        [alt]="user.name"
        class="size-10 shrink-0 rounded-full object-cover"
      />
      <div class="min-w-0" [class.hidden]="collapsed">
        <div class="truncate text-base font-medium text-color">{{ user.name }}</div>
        <div class="truncate text-[length:var(--font-size-label)] text-muted-color">{{ user.title }}</div>
      </div>
    </div>
  </div>
</nav>
