<nav
  id="sidebar-main-nav"
  class="sidebar-nav flex h-full w-full flex-col bg-surface-0 px-3 py-5"
  aria-label="Main navigation"
>
  <div
    class="flex items-center gap-2 px-2"
    [class.justify-between]="!collapsed"
    [class.justify-center]="collapsed"
  >
    <div
      class="sidebar-brand flex min-w-0 items-center gap-1"
      role="img"
      aria-label="Pipeline"
    >
      <img
        src="/piplogotrsp.png"
        alt=""
        aria-hidden="true"
        class="h-8 w-auto shrink-0 object-contain"
      />
      <span
        class="min-w-0 font-[family-name:var(--font-heading)] text-[length:var(--font-size-heading-md)] font-bold uppercase tracking-[0.1em] text-primary"
        aria-hidden="true"
      >
        ipeline
      </span>
    </div>

    <button
      type="button"
      class="sidebar-toggle"
      [attr.aria-expanded]="!collapsed"
      aria-controls="sidebar-main-nav"
      [attr.aria-label]="toggleLabel"
      (click)="toggle.emit()"
    >
      <span
        class="pi text-lg"
        [class.pi-chevron-left]="!collapsed"
        [class.pi-chevron-right]="collapsed"
        aria-hidden="true"
      ></span>
    </button>
  </div>

  <p-menu
    [model]="menuModel"
    [popup]="false"
    ariaLabel="Dashboard sections"
    styleClass="dashboard-nav-menu mt-6 w-full flex-1"
  />

  <p-card styleClass="dashboard-card sidebar-user-card mt-auto w-full">
    <div class="sidebar-user flex items-center gap-3" aria-label="Signed in user">
      <p-avatar [label]="userInitials" shape="circle" aria-hidden="true" />
      <div class="sidebar-user-text min-w-0">
        <div class="truncate text-base font-medium text-color">{{ user.name }}</div>
        <div class="truncate text-[length:var(--font-size-label)] text-muted-color">{{ user.title }}</div>
      </div>
    </div>
  </p-card>
</nav>
