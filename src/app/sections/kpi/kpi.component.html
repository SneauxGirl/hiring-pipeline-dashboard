<section
  class="flex flex-col gap-3 sm:flex-row sm:flex-wrap xl:flex-nowrap"
  aria-label="Key performance indicators"
>
  @for (kpi of kpis; track kpi.label) {
    <p-card styleClass="min-w-0 flex-1 basis-full sm:basis-[calc(50%-0.375rem)] xl:basis-0">
      <div class="flex flex-col gap-2">
        <span class="text-[length:var(--font-size-label)] text-muted-color">{{ kpi.label }}</span>

        <div
          class="font-[family-name:var(--font-heading)] text-[2rem] leading-none font-semibold"
          [style.color]="metricColor(kpi)"
        >
          <span>{{ kpi.value }}</span>
          @if (kpi.valueUnit) {
            <span class="text-[1.35rem] font-medium"> {{ kpi.valueUnit }}</span>
          }
        </div>

        @if (kpi.delta) {
          <div
            class="flex items-center gap-1 text-[length:var(--font-size-label)]"
            [style.color]="metricColor(kpi)"
          >
            @if (trendIcon(kpi.trend); as icon) {
              <span [class]="icon" aria-hidden="true"></span>
            }
            <span>{{ kpi.delta }}</span>
          </div>
        }
      </div>
    </p-card>
  }
</section>
