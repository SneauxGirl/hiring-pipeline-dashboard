<section
  class="grid w-full min-w-0 grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-4"
  aria-label="Key performance indicators"
>
  @for (kpi of kpis; track kpi.label) {
    <p-card styleClass="min-w-0">
      <div class="flex min-w-0 flex-col gap-1.5 xl:gap-2">
        <span class="text-pretty text-[length:var(--font-size-label)] leading-snug text-muted-color">{{
          kpi.label
        }}</span>

        <div
          class="text-[1.375rem] leading-none font-semibold text-muted-color-emphasis xl:text-[2rem]"
        >
          <span>{{ kpi.value }}</span>
          @if (kpi.valueUnit) {
            <span class="text-[1.125rem] font-medium xl:text-[1.35rem]"> {{ kpi.valueUnit }}</span>
          }
        </div>

        @if (kpi.delta) {
          <p
            class="m-0 flex min-w-0 flex-wrap items-center gap-x-1 gap-y-0.5 text-[length:var(--font-size-label)] leading-snug text-primary"
            tabindex="0"
            [attr.aria-label]="deltaAccessibleLabel(kpi)"
            [pTooltip]="deltaAccessibleLabel(kpi)"
            tooltipEvent="both"
            tooltipPosition="bottom"
            [fitContent]="true"
          >
            <span class="flex min-w-0 flex-wrap items-center gap-x-1 gap-y-0.5" aria-hidden="true">
              @if (trendIcon(kpi.trend); as icon) {
                <span class="shrink-0" [class]="icon"></span>
              }
              <span class="min-w-0">{{ kpi.delta }}</span>
            </span>
          </p>
        }
      </div>
    </p-card>
  }
</section>
