<div class="flex min-h-screen w-full min-w-0 flex-col bg-surface-0 md:flex-row">
  @let data = dashboard();

  <app-sidebar-nav
    [user]="user"
    [collapsed]="sidebarCollapsed"
    (toggle)="sidebarCollapsed = !sidebarCollapsed"
  />

  <div
    class="@container/dashboard dashboard-page flex w-full min-w-0 flex-none flex-col bg-surface-50 md:flex-1"
  >
    <app-mobile-header [user]="user" />

    <main
      class="flex min-w-0 flex-1 flex-col gap-[length:var(--dashboard-grid-gap)] box-border w-full max-w-[length:var(--dashboard-max-width)] mx-auto px-[length:var(--dashboard-margin)] pb-5 pt-[length:var(--dashboard-header-padding-block)] @min-[43.25rem]/dashboard:flex-row @min-[43.25rem]/dashboard:flex-wrap @min-[43.25rem]/dashboard:items-stretch md:pb-6 md:pt-[length:var(--dashboard-header-padding-block-lg)] [&_.p-card-body>*]:min-w-0 [&_.p-card-content>*]:min-w-0"
    >
      <app-page-header
        class="{{ sectionFullRowClass }} hidden md:block"
        [user]="user"
        [viewerDay]="viewerDay()"
        [calendarMinDate]="calendarNav().min"
        [calendarMaxDate]="calendarNav().max"
        [selectedDate]="selectedDate()"
        (selectedDateChange)="onSelectedDateChange($event)"
      />

      <app-kpi
        class="{{ sectionFullRowClass }} max-md:order-1"
        [kpiValues]="data.kpis"
      />

      <app-bottleneck
        class="w-full min-w-0 max-md:order-3 {{ gridColumnClass }}"
        [bottleneckMetrics]="data.bottlenecks"
      />

      <app-trends
        class="w-full min-w-0 max-md:order-2 {{ gridColumnClass }}"
        [trendValues]="trendValues()"
      />

      <app-funnel
        class="w-full min-w-0 max-md:order-5 {{ funnelColumnClass }}"
        [funnelStageValues]="data.funnelStages"
        [stageDurationDays]="data.stageDurationDays"
      />

      <app-schedule
        class="w-full min-w-0 max-md:hidden {{ scheduleColumnClass }}"
        [schedule]="data.schedule"
        [candidates]="data.candidates"
      />

      <app-requisitions
        class="w-full min-w-0 max-md:order-4 {{ reqsColumnClass }}"
        [requisitions]="data.openRequisitions"
      />
    </main>
  </div>
</div>
