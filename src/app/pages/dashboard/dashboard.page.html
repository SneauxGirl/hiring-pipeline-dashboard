<div class="flex min-h-screen bg-white">
  <app-sidebar-nav
    [navItems]="data.navItems"
    [user]="data.user"
    [collapsed]="sidebarCollapsed"
    (toggle)="sidebarCollapsed = !sidebarCollapsed"
  />

  <div class="flex min-w-0 flex-1 flex-col">
    <app-mobile-header [user]="data.user" [navItems]="data.navItems" />

    <main class="dashboard-main flex flex-1 flex-col gap-5 py-5 lg:flex-row lg:flex-wrap lg:py-6">
      <app-page-header class="w-full min-w-0 lg:order-1" [user]="data.user" />
      <app-kpi class="w-full min-w-0 lg:order-2" [kpis]="data.kpis" />
      <app-schedule
        class="w-full min-w-0 lg:order-6 lg:w-[calc(33.333%-0.67rem)]"
        [schedule]="data.schedule"
        [candidates]="data.candidates"
      />
      <app-bottleneck
        class="w-full min-w-0 lg:order-5 lg:w-[calc(33.333%-0.67rem)]"
        [bottlenecks]="data.bottlenecks"
      />
    </main>
  </div>
</div>
